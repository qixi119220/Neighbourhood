<!DOCTYPE html>
<html>
<head>
    <title>RK3576 Audio Debug Tool</title>
</head>
<body>
    <h1>WebRTC Audio Debug (No AEC/NS)</h1>
    
    <section>
        <h3>1. Media Playback</h3>
        <audio id="bgMusic" controls loop>
            <source src="https://www.w3schools.com/html/horse.ogg" type="audio/ogg">
            Your browser does not support the audio element.
        </audio>
    </section>

    <hr>

    <section>
        <h3>2. WebRTC Recording (USAGE_VOICE_COMMUNICATION)</h3>
        <button id="startBtn">Start WebRTC (Disable AEC/NS)</button>
        <button id="stopBtn" disabled>Stop</button>
        <p>Status: <span id="status">Idle</span></p>
    </section>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const bgMusic = document.getElementById('bgMusic');
        let localStream;

        startBtn.onclick = async () => {
            try {
                // 核心：在申请媒体流时，显式关闭 WebRTC 内部算法
                const constraints = {
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                };

                // 启动媒体播放（模拟 Media 流量）
                bgMusic.play();

                // 启动录音（触发系统 Source 5）
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                status.innerText = "WebRTC Active (Raw Mic)";
                startBtn.disabled = true;
                stopBtn.disabled = false;
                console.log("WebRTC Stream started without algorithms");
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        };

        stopBtn.onclick = () => {
            localStream.getTracks().forEach(track => track.stop());
            bgMusic.pause();
            status.innerText = "Idle";
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };
    </script>
</body>
</html>
